server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hotpot?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

hotpot:
  jwt:
    secret: hotpot-secret-key-2024
    expire: 86400000
  upload:
    path: ${user.dir}/uploads/
  wx:
    appid: your-appid
    secret: your-secret
